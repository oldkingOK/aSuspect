name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          check-latest: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"

          NAME="${{ github.event.repository.name }}"
          if [ "$GOOS" = "windows" ]; then
            NAME="${NAME}.exe"
          fi

          go build \
            -ldflags="-s -w -X main.appVersion=${VERSION}" \
            -o "${NAME}" .

          mkdir -p dist
          if [ "$GOOS" = "windows" ]; then
            zip -j "dist/${{ github.event.repository.name }}_${GOOS}_${GOARCH}.zip" "${NAME}"
          else
            tar czf "dist/${{ github.event.repository.name }}_${GOOS}_${GOARCH}.tar.gz" "${NAME}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ github.event.repository.name }}_${{ matrix.goos }}_${{ matrix.goarch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
